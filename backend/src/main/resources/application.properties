# App Name
spring.application.name=activities-backend

# Server Port (Render auto injects PORT)
server.port=${PORT:8080}

# ===============================
# DATABASE CONFIG (Render PostgreSQL)
# ===============================
spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${PGUSER}
spring.datasource.password=${PGPASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# ===============================
# JWT CONFIG
# ==============================
app.jwt.secret=${JWT_SECRET:mySuperSecretKeyThatIsAtLeast32BytesLong1234567890!}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# ===============================
# EMAIL CONFIG (GMAIL SMTP)
# ===============================
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}

spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

app.mail.from=${MAIL_FROM:noreply@yourapp.com}
app.mail.strict-delivery=false

# ===============================
# OTP CONFIG
# ===============================
app.otp.expiry-minutes=10
app.otp.max-attempts=5
app.otp.lock-minutes=15
app.otp.resend-cooldown-seconds=60
app.otp.cleanup-cron=0 */15 * * * *

# ===============================
# CORS
# ===============================
app.cors.allowed-origin-patterns=${CORS_ALLOWED_ORIGINS:http://localhost:*,http://127.0.0.1:*,https://*.vercel.app}
