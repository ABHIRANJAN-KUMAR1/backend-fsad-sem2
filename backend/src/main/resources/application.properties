spring.application.name=activities-backend

# Server Configuration (default 8082 matches frontend/vite.config.ts proxy target)
server.port=${PORT:8080}

# PostgreSQL Database Configuration
spring.datasource.url=${JDBC_DATABASE_URL:jdbc:postgresql://${PGHOST:localhost}:${PGPORT:5433}/${PGDATABASE:myproject}}
spring.datasource.username=${PGUSER:postgres}
spring.datasource.password=${PGPASSWORD:Abhi$1234}
spring.datasource.driver-class-name=${DATABASE_DRIVER:org.postgresql.Driver}
spring.jpa.database-platform=${JPA_DIALECT:org.hibernate.dialect.PostgreSQLDialect}


# JPA / Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.default_schema=public
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# JWT Configuration
app.jwt.secret=${JWT_SECRET:change-me-in-production-jwt-secret}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# Email Integration
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:ujjwalsuryavanshi0110.ai@gmail.com}
spring.mail.password=${MAIL_PASSWORD:cdos fgnx elui qltr}
spring.mail.properties.mail.smtp.auth=${MAIL_SMTP_AUTH:true}
spring.mail.properties.mail.smtp.starttls.enable=${MAIL_SMTP_STARTTLS:true}
app.mail.from=${MAIL_FROM:noreply-sac@college.edu}
# If false, OTP is logged when SMTP fails or is unconfigured. 
# Set to true by default for production environments to avoid silent failures.
app.mail.strict-delivery=${MAIL_STRICT_DELIVERY:false}

# OTP security controls
app.otp.expiry-minutes=${OTP_EXPIRY_MINUTES:10}
app.otp.max-attempts=${OTP_MAX_ATTEMPTS:5}
app.otp.lock-minutes=${OTP_LOCK_MINUTES:15}
app.otp.resend-cooldown-seconds=${OTP_RESEND_COOLDOWN_SECONDS:60}
app.otp.cleanup-cron=${OTP_CLEANUP_CRON:0 */15 * * * *}

# CORS (comma-separated origin patterns)
app.cors.allowed-origin-patterns=${CORS_ALLOWED_ORIGINS:http://localhost:*,http://127.0.0.1:*,https://*.vercel.app}
